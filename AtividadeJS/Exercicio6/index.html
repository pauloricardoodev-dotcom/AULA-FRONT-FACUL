<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Infinity Bank - Orçamento de Evento</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
  <h1>Infinity Bank</h1>
  <p class="sub">Crédito para Festas &amp; Eventos</p>

  <label for="pacote">Pacote</label>
  <select id="pacote">
    <option value="">-- Selecione --</option>
    <option value="50">Standard — R$ 50,00 / pessoa</option>
    <option value="80">Premium — R$ 80,00 / pessoa</option>
    <option value="120">Infinity Deluxe — R$ 120,00 / pessoa</option>
  </select>

  <label for="pessoas">Quantidade de Pessoas</label>
  <input type="number" id="pessoas" min="1" placeholder="Ex: 150">

  <button onclick="calcular()">Calcular Orçamento</button>

  <div id="msg-erro" class="erro"></div>

  <div id="resultado">
    <h2>Resumo do Orçamento</h2>
    <div class="linha">
      <span>Custo bruto</span>
      <span id="val-bruto"></span>
    </div>
    <div class="linha">
      <span>Taxa de serviço (10%)</span>
      <span id="val-taxa"></span>
    </div>
    <div class="linha desconto-linha" id="linha-desconto" style="display:none">
      <span>Desconto fidelidade (5%)</span>
      <span id="val-desconto"></span>
    </div>
    <div class="linha total">
      <span>Total final</span>
      <span id="val-total"></span>
    </div>
  </div>
</div>

<script src="./script.js"></script>

</body>
</html>
